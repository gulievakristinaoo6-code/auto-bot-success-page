<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    box-sizing:border-box;
}

html, body{
    margin:0;
    padding:0;
    height:100%;
}

/* Плавное появление страницы */
body{
    background:#ffffff;
    display:flex;
    justify-content:center;
    font-family: Arial, sans-serif;
    animation: fadeIn 0.6s ease forwards;
    opacity:0;
}

@keyframes fadeIn{
    to{opacity:1;}
}

.screen{
    width:100%;
    max-width:420px;
    height:100vh;
    position:relative;
    overflow:hidden;
}

/* Фон-картинка */
.bg{
    position:absolute;
    top:0;
    left:50%;
    transform:translateX(-50%);
    width:120%;
    height:auto;
}

/* КНОПКА */
.btn{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    bottom:175px;

    width:80%;
    max-width:320px;
    height:56px;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:20px;
    font-weight:600;
    color:#1f6fb8;

    text-decoration:none;

    background:#eaf3ff;
    border-radius:18px;
    border:1px solid rgba(31,111,184,0.2);

    box-shadow:0 10px 25px rgba(31,111,184,0.18);

    transition:0.2s ease;
}

/* Лёгкий эффект нажатия без смены цвета */
.btn:active{
    transform:translateX(-50%) scale(0.98);
}
</style>
</head>

<body>

<div class="screen">

    <img src="logo.png" class="bg">

    <a class="btn" href="https://t.me/Automobile1_bot" target="_blank">
        Перейти
    </a>

</div>

</body>
</html>
